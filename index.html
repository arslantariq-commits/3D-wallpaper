<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexBot Live AI Wallpaper</title>
    <script type="importmap">
        {
            "imports": {
                "@splinetool/runtime": "https://unpkg.com/@splinetool/runtime@1.0.55/build/spline-runtime.js"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a16;
            font-family: monospace;
        }
        #canvas3d {
            width: 100%;
            height: 100%;
        }
        .status-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #webcam {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #a855f7;
            transform: scaleX(-1);
            z-index: 10;
            background: #000;
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a16;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            z-index: 100;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingScreen">
        🤖 Loading NexBot 3D Scene...
    </div>

    <div class="status-panel">
        <div>Status: <span id="statusText" style="color: #f59e0b;">Initializing...</span></div>
        <div>Interaction: <span style="color: #38bdf8;">Mouse tracking enabled</span></div>
    </div>

    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="canvas3d"></canvas>

    <script type="module" src="app.js"></script>
</body>
</html>
